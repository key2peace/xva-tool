name: XVA-TOOL Core Test Suite

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

# Force absolute execution serialization. Never kill in-progress test workflows.
concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: false

jobs:
  validate:
    name: Execute Framework Tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v6

      - name: Setup Python Runtime Environment
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          # Removed the 'cache: pip' flag to prevent validation crashes on missing files

      - name: Execute Cross-Compatibility Tests
        run: |
          python -m compileall xva-tool plugins-available/
          python xva-tool --help
