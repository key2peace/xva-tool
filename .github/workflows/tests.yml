# ==============================================================================
#          XVATOOL - CONTINUOUS INTEGRATION AUTOMATED TESTING PIPELINE
# ==============================================================================
name: XvaTool Continuous Integration

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  run-tests:
    name: "Execute Core Framework In-Memory Test Suite"
    runs-on: ubuntu-20.04

    steps:
    - name: Check out repository source code
      uses: actions/checkout@v4

    - name: Set up Native Python 2.7 Environment Core
      uses: actions/setup-python@v5
      with:
        python-version: '2.7'

    - name: Execute Embedded Operational Verification Test Harness
      run: |
        python xva-tool --quiet info /dev/null || true
