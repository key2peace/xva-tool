# ==============================================================================
#          XVATOOL - CONTINUOUS INTEGRATION & ORCHESTRATION PIPELINE
# ==============================================================================
name: XvaTool Continuous Integration

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test-suite:
    name: "Execute Python 2.7 RAM Unit Tests"
    runs-on: ubuntu-20.04

    steps:
    - name: Check out repository source code
      uses: actions/checkout@v4

    - name: Initialize Legacy Python 2.7 Environment Space
      uses: actions/setup-python@v5
      with:
        python-version: '2.7'

    - name: Verify Environment Shell Tool Availability
      run: |
        python --version
        python -m unittest --help > /dev/null

    - name: Execute Autonomous In-Memory Test Suite
      run: |
        python -m unittest discover -s tests -p "test_*.py"

  validate-packaging:
    name: "Validate OS Package Distributions"
    needs: test-suite
    runs-on: ubuntu-latest
    steps:
    - name: Check out repository source code
      uses: actions/checkout@v4

    - name: Sanity Check Control Files Layout
      run: |
        test -f xva-tool
        test -f xvapkg
        test -f xva-tool.1
        test -f debian/control
        test -f rpm/xva-tool.spec
        test -f slackware/slack-desc

  sync-wiki-documentation:
    name: "Synchronize Local Docs to GitHub Wiki"
    needs: test-suite
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    permissions:
      contents: write
      
    steps:
    - name: Check out repository source code
      uses: actions/checkout@v4

    - name: Execute Autonomous Wiki Repository Synchronization
      uses: Andrew-Chen-Wang/github-wiki-action@v4
      with:
        path: docs/
        token: ${{ secrets.GITHUB_TOKEN }}
