# ==============================================================================
#          XVATOOL - CODEQL SECURITY AUTOMATED SCANNING PIPELINE (V4)
# ==============================================================================
name: "XvaTool CodeQL Security Scan"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  schedule:
    - cron: '30 4 * * 0'

jobs:
  analyze:
    name: "Analyze Python Source Elements"
    runs-on: ubuntu-20.04
    permissions:
      actions: read
      contents: read
      security-events: write

    steps:
    - name: Check out repository source code
      uses: actions/checkout@v4

    - name: Initialize CodeQL Framework Context
      uses: github/codeql-action/init@v4
      with:
        languages: 'python'

    - name: Perform CodeQL Forensic Binary Analysis
      uses: github/codeql-action/analyze@v4
