# ==============================================================================
#          XVATOOL - AUTOMATED MULTI-DISTRO RELEASE PACKAGING PIPELINE
# ==============================================================================
name: XvaTool Automated Release Production

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  release:
    types: [published]
  push:
    tags:
      - 'v*'

jobs:
  build-packages:
    name: "Compile Multi-Distro Native Packages"
    runs-on: ubuntu-20.04
    permissions:
      contents: write

    steps:
    - name: Check out repository source code
      uses: actions/checkout@v4

    - name: Initialize Packaging Environments Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y --no-install-recommends dpkg-dev rpm binutils python2-minimal

    # --- 1. DEBIAN PACKAGING EXTREMITIES ---
    - name: Compile Native Debian Package (.deb)
      run: |
        mkdir -p build/debian/usr/bin
        mkdir -p build/debian/usr/share/man/man1
        mkdir -p build/debian/DEBIAN
        cp xva-tool build/debian/usr/bin/
        cp xvapkg build/debian/usr/bin/
        gzip -9c xva-tool.1 > build/debian/usr/share/man/man1/xva-tool.1.gz
        cp debian/control build/debian/DEBIAN/
        cp debian/changelog build/debian/DEBIAN/
        chmod 755 build/debian/usr/bin/*
        chmod 644 build/debian/DEBIAN/control
        dpkg-deb --build build/debian xva-tool-1.0.0-all.deb

    # --- 2. RED HAT PACKAGING EXTREMITIES ---
    - name: Compile Native Red Hat Package (.rpm)
      run: |
        mkdir -p rpmbuild/{BUILD,RPMS,SOURCES,SPECS,SRPMS}
        cp xva-tool xvapkg xva-tool.1 rpmbuild/SOURCES/
        cp rpm/xva-tool.spec rpmbuild/SPECS/
        rpmbuild --define "_topdir $(pwd)/rpmbuild" -bb rpmbuild/SPECS/xva-tool.spec
        cp rpmbuild/RPMS/noarch/*.rpm .

    # --- 3. SLACKWARE PACKAGING EXTREMITIES ---
    - name: Compile Native Slackware Package (.txz)
      run: |
        mkdir -p build/slackware/usr/bin
        mkdir -p build/slackware/usr/man/man1
        mkdir -p build/slackware/install
        cp xva-tool xvapkg build/slackware/usr/bin/
        gzip -9c xva-tool.1 > build/slackware/usr/man/man1/xva-tool.1.gz
        cp slackware/slack-desc build/slackware/install/
        chmod 755 build/slackware/usr/bin/*
        cd build/slackware && tar -cvJf ../../xva-tool-1.0.0-noarch-1.txz .

    # --- 4. PYTHON PIP SOURCE DIST EXTRINSICS ---
    - name: Compile Universal Python Source Tarball (.tar.gz)
      run: |
        python2 setup.py sdist --formats=gztar
        cp dist/*.tar.gz .

    # --- 5. AUTOMATED ARTIFACT UPLOAD TO GITHUB RELEASE ---
    - name: Deploy Binary Packages straight to Live GitHub Release
      uses: softprops/action-gh-release@v3
      if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'release'
      with:
        files: |
          *.deb
          *.rpm
          *.txz
          *.tar.gz
